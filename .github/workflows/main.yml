name: Build My iPhone Mirror App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # These are the exact requirements for the UxPlay code
          choco install cmake openssl gstreamer -y
          # Setting the exact paths for the Windows system
          echo "C:\gstreamer\1.0\msvc_x86_64\bin" >> $GITHUB_PATH
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=C:\gstreamer\1.0\msvc_x86_64\" >> $GITHUB_ENV

      - name: Compile App
        shell: bash
        run: |
          # Moving specifically into your project folder
          cd antimonyxv-UxPlay
          mkdir build
          cd build
          # Explicitly linking the libraries to the compiler
          cmake .. -DNO_X11_DEPS=ON \
                   -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL-Win64" \
                   -DGSTREAMER_1_0_ROOT_MSVC_X86_64="C:/gstreamer/1.0/msvc_x86_64/"
          cmake --build . --config Release

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-App-Windows
          # Telling GitHub exactly where the output file is located
          path: antimonyxv-UxPlay/build/Release/uxplay.exe
