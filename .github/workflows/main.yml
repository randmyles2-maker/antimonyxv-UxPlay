name: Build My iPhone Mirror App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          choco install cmake openssl gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad -y
          # This tells the builder exactly where the video tools are located
          echo "C:\gstreamer\1.0\msvc_x86_64\bin" >> $GITHUB_PATH
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=C:\gstreamer\1.0\msvc_x86_64\" >> $GITHUB_ENV

      - name: Compile App
        shell: bash
        run: |
          mkdir build
          cd build
          # We add a flag to skip 'X11' because that is for Linux, not Windows
          cmake .. -DNO_X11_DEPS=ON -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL-Win64"
          cmake --build . --config Release

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-App-Windows
          path: build/Release/uxplay.exe
