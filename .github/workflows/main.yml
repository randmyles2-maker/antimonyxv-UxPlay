name: Build My iPhone Mirror App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # Direct install of the 3 required tools
          choco install cmake openssl gstreamer -y
          # Setting the exact system paths for the video engine
          echo "C:\gstreamer\1.0\msvc_x86_64\bin" >> $GITHUB_PATH
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=C:\gstreamer\1.0\msvc_x86_64\" >> $GITHUB_ENV

      - name: Verify Files
        shell: bash
        run: ls -R  # This shows us every file so we know exactly where we are

      - name: Compile App
        shell: bash
        run: |
          # We check if the folder exists; if not, we stay in the main folder
          if [ -d "antimonyxv-UxPlay" ]; then cd antimonyxv-UxPlay; fi
          mkdir build
          cd build
          # Running the build with direct links to the libraries
          cmake .. -DNO_X11_DEPS=ON \
                   -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL-Win64" \
                   -DGSTREAMER_1_0_ROOT_MSVC_X86_64="C:/gstreamer/1.0/msvc_x86_64/"
          cmake --build . --config Release

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Mirror-App-Windows
          # This tells GitHub to find the .exe no matter which folder it's in
          path: "**/build/Release/uxplay.exe"
